<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>کاردکس مشتری</title>

<link rel="stylesheet" href="style.css">

<style>

.ledger-header{
background:#1976d2;
color:white;
padding:15px;
text-align:center;
position:sticky;
top:0;
z-index:100;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

.back-link{
position:absolute;
right:15px;
top:15px;
color:white;
text-decoration:none;
font-size:0.8rem;
border:1px solid rgba(255,255,255,0.4);
padding:2px 8px;
border-radius:5px;
}

.ledger-label-row{
display:flex;
justify-content:space-between;
padding:10px 5px;
background:#f5f5f5;
font-size:0.8rem;
color:#666;
font-weight:bold;
border-bottom:1px solid #ddd;
}

.ledger-row{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 5px;
border-bottom:1px solid #eee;
font-size:0.9rem;
}

.ledger-date{
width:80px;
color:#888;
font-size:0.75rem;
text-align:right;
}

.ledger-type{
width:70px;
text-align:center;
font-weight:bold;
}

.ledger-total{
width:120px;
text-align:center;
font-weight:bold;
color:#333;
}

.ledger-paid{
width:120px;
text-align:center;
font-weight:bold;
color:#1565c0;
}

.ledger-balance{
width:120px;
text-align:left;
font-weight:bold;
}

.balance-positive{
color:#2e7d32;
}

.balance-negative{
color:#c62828;
}

.btn-call-container{
padding:20px;
}

.btn-call{
background:#2e7d32;
color:white;
border:none;
padding:15px;
border-radius:12px;
width:100%;
font-size:1rem;
font-weight:bold;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
gap:8px;
}

</style>
</head>

<body>

<div class="ledger-header">

<a href="customers.html" class="back-link">
بازگشت
</a>

<h2 id="customerNameDisplay">
بارگذاری...
</h2>

<small id="customerPhoneDisplay"></small>

</div>


<main class="container">

<section class="card" style="padding:10px;">

<div class="ledger-label-row">

<span style="width:80px">
تاریخ
</span>

<span style="width:70px;text-align:center">
نوع
</span>

<span style="width:120px;text-align:center">
مبلغ معامله
</span>

<span style="width:120px;text-align:center">
پرداخت / دریافت
</span>

<span style="width:120px;text-align:left">
مانده
</span>

</div>


<div id="ledgerList">

<!-- ردیف های تراکنش توسط ledger.js ساخته می شوند -->

</div>

</section>


<div class="btn-call-container">

<button id="callBtn" class="btn-call">
📞 تماس با مشتری
</button>

</div>

</main>


<script src="db.js"></script>
<script src="ledger.js"></script>

</body>
</html>
